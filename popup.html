<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartShield</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="header">
    <img src="icons/iconheartshield.png" alt="HeartShield Logo" class="logo">
    <h2>HeartShield</h2>
  </div>
  <p>Protégez-vous des contenus indésirables.</p>

  <div class="input-group">
    <label for="email">Alertes par email :</label>
    <input type="email" id="email" placeholder="votre@email.com" />
    <button id="saveBtn">Enregistrer</button>
  </div>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>

</html>
